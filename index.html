<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Agent FC</title>
    <meta name="theme-color" content="#00a676" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" />
    <script>
      (async () => {
        try {
          const bootVersion = '2026-04-20-v3';
          const key = 'agent-fc-boot-version';
          const previous = localStorage.getItem(key);
          if (previous !== bootVersion) {
            if ('serviceWorker' in navigator) {
              const regs = await navigator.serviceWorker.getRegistrations();
              await Promise.all(regs.map((reg) => reg.unregister()));
            }
            if ('caches' in window) {
              const keys = await caches.keys();
              await Promise.all(keys.map((cacheName) => caches.delete(cacheName)));
            }
            localStorage.setItem(key, bootVersion);
          }
        } catch (error) {
          console.warn('[AgentFoot] boot cleanup skipped', error);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div id="boot-fallback" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#f7f9fb,#eef2f5);color:#172026;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:24px;text-align:center;">
        <div>
          <div style="font-size:42px;line-height:1;margin-bottom:12px;">⚡</div>
          <div style="font-size:18px;font-weight:900;letter-spacing:.08em;margin-bottom:6px;">Agent FC</div>
          <div style="font-size:13px;color:#64727d;line-height:1.6;">Chargement de la carrière...</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
