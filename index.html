<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Agent FC</title>
    <meta name="theme-color" content="#00a676" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" />
    <script>
      (async () => {
        try {
          const bootVersion = '2026-04-20-v3';
          const key = 'agent-fc-boot-version';
          const previous = localStorage.getItem(key);
          if (previous !== bootVersion) {
            if ('serviceWorker' in navigator) {
              const regs = await navigator.serviceWorker.getRegistrations();
              await Promise.all(regs.map((reg) => reg.unregister()));
            }
            if ('caches' in window) {
              const keys = await caches.keys();
              await Promise.all(keys.map((cacheName) => caches.delete(cacheName)));
            }
            localStorage.setItem(key, bootVersion);
          }
        } catch (error) {
          console.warn('[AgentFoot] boot cleanup skipped', error);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div id="boot-fallback" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#f7f9fb,#eef2f5);color:#172026;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:24px;text-align:center;">
        <div>
          <div style="font-size:42px;line-height:1;margin-bottom:12px;">⚡</div>
          <div style="font-size:18px;font-weight:900;letter-spacing:.08em;margin-bottom:6px;">Agent FC</div>
          <div id="boot-fallback-text" style="font-size:13px;color:#64727d;line-height:1.6;margin-bottom:14px;">Chargement de la carrière...</div>
          <button id="boot-hard-reset" type="button" style="display:inline-flex;align-items:center;justify-content:center;gap:8px;background:#172026;color:#ffffff;border:none;border-radius:8px;padding:12px 16px;font-size:12px;font-weight:900;letter-spacing:.06em;cursor:pointer;box-shadow:0 12px 26px rgba(15,23,32,.14);">
            Réinitialiser la version locale
          </button>
        </div>
      </div>
    </div>
    <script>
      window.__agentFootHardReset = async () => {
        try {
          localStorage.removeItem('agent_foot_save');
          localStorage.removeItem('agent_foot_save_bak_0');
          localStorage.removeItem('agent_foot_save_bak_1');
          localStorage.removeItem('agent_foot_save_bak_2');
          localStorage.removeItem('agent-fc-boot-version');
        } catch (error) {
          console.warn('[AgentFoot] localStorage reset skipped', error);
        }
        try {
          if ('indexedDB' in window) {
            indexedDB.deleteDatabase('agent_foot_local_db');
          }
        } catch (error) {
          console.warn('[AgentFoot] indexedDB reset skipped', error);
        }
        try {
          if ('caches' in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((cacheName) => caches.delete(cacheName)));
          }
        } catch (error) {
          console.warn('[AgentFoot] cache reset skipped', error);
        }
        try {
          if ('serviceWorker' in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map((reg) => reg.unregister()));
          }
        } catch (error) {
          console.warn('[AgentFoot] service worker reset skipped', error);
        }
        window.location.reload();
      };
      const bootResetBtn = document.getElementById('boot-hard-reset');
      if (bootResetBtn) bootResetBtn.addEventListener('click', () => window.__agentFootHardReset?.());
      const bootFallbackText = document.getElementById('boot-fallback-text');
      if (bootFallbackText) {
        let dots = 0;
        setInterval(() => {
          dots = (dots + 1) % 4;
          bootFallbackText.textContent = `Chargement de la carrière${'.'.repeat(dots)}`;
        }, 900);
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
